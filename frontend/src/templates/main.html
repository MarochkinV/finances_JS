<!--Заголовок-->
<div class="p-5 mt-5">
    <h1>Главная</h1>
</div>
<!--Кнопки с различными периодами года-->
<div class="d-flex align-items-center pl-5 pb-5">
    <div>
        <button type="button" class="btn btn-block btn-outline-secondary btn-fixed" id="btn-today">Сегодня</button>
    </div>
    <div>
        <button type="button" class="btn btn-block btn-outline-secondary btn-fixed ml-3" id="btn-week">Неделя</button>
    </div>
    <div>
        <button type="button" class="btn btn-block btn-outline-secondary btn-fixed ml-3" id="btn-month">Месяц</button>
    </div>
    <div>
        <button type="button" class="btn btn-block btn-outline-secondary btn-fixed ml-3" id="btn-year">Год</button>
    </div>
    <div>
        <button type="button" class="btn btn-block btn-outline-secondary btn-fixed ml-3" id="btn-all-periods-calendar">
            Все
        </button>
    </div>
    <div>
        <button type="button" class="btn btn-block btn-outline-secondary btn-fixed ml-3" id="btn-interval">Интервал
        </button>
    </div>
    <!--Даты-->
    <div>
        <span class="ml-3">c</span>
        <a class="ml-3 text-secondary" style="text-decoration: underline" href="#">Дата</a>
        <span class="ml-3">по</span>
        <a class="ml-3 text-secondary" style="text-decoration: underline" href="#">Дата</a>
    </div>
</div>



<!--Диаграммы пирог-->
<div class="d-flex justify-content-around align-items-end p-5">
    <div>
        <span class="d-block text-center " style="color: #290661; font-size: 28px; font-weight: 500;">Доходы</span>
        <div style="width: 450px;">
            <canvas id="income_pie"></canvas>
        </div>
    </div>
    <div class="d-block" style="border-right: 1px solid #D9D9D9; height: 405px;"></div>
    <div>
        <span class="d-block text-center " style="color: #290661; font-size: 28px; font-weight: 500;">Расходы</span>
        <div style="width: 450px;">
            <canvas id="expense_pie"></canvas>
        </div>
    </div>
</div>
